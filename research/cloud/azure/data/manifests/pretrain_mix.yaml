# Aggregate: ~27.8B tokens, weights sum to ~1.00
total_tokens_b: 27.8

# Component-resonant curriculum (consumed by Step 7 phased weighting).
# Phases are keyed on fraction of total training progress. Each phase lists
# the components whose weight is RAMPED UP during it; unlisted components keep
# a small floor weight so nothing fully starves (soft scheduled mixture).
curriculum:
  mode: soft            # soft scheduled mixture (interpolated weights)
  floor_weight: 0.15    # min fraction of a component's base weight when "off"
  phases:
    - name: grammar
      until: 0.15
      emphasize: [general]
    - name: logic_kleene
      until: 0.30
      emphasize: [general, kleene]
    - name: logic_tropical
      until: 0.45
      emphasize: [general, kleene, sheaf]
    - name: logic_sheaf
      until: 0.60
      emphasize: [general, kleene, sheaf]
    - name: memory
      until: 0.80
      emphasize: [general, padic, gist]
    - name: integration
      until: 1.00
      emphasize: [general, kleene, sheaf, padic, gist, rg]
