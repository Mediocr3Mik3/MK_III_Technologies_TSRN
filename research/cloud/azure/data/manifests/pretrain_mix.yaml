# =====================================================================
# Pretraining data mixture — quality-first, component-resonant (~28B)
# =====================================================================
# Phi-extreme philosophy: the 90B per-component quotas in
# component_quota_tracker.py are CAPS. We train first on the best ~28B
# resonant tokens, expanding only if quality holds.
#
# Each entry:
#   name        : identifier (== tokenized shard subdir under tokens_dir)
#   component   : kleene|sheaf|padic|gist|rg|general  (drives the curriculum)
#   hf_dataset  : HuggingFace path (null for synthetic/local sources)
#   hf_config   : HF config (subset) or null
#   split       : HF split
#   tokens_b    : target token budget in billions
#   weight      : sampling weight (sums to ~1.00)
#   text_field  : column with raw text (for download.py)
#   source_formatter : formatter used to build processed shards (or null)
#   download    : pipeline/download_sources.py key(s) to fetch raw -> E: (or null
#                 for already-present / synthetic sources)
#   purpose     : research note
#
# Local prep flow (all on E:, CPU):
#   1. python pipeline/download_sources.py --only <keys>   (missing curated)
#   2. python pipeline/prepare_corpus.py   --manifest <this file>
#   3. python pipeline/extend_tokenizer.py (freeze tmt_48k.json)
#   4. python pipeline/create_shards.py    (score+split+tokenize -> shards)
# Present locally already: fineweb_edu, finemath, openwebmath, all syn_type_*,
#   go.obo+chebi.obo, wordnet, nli. Remaining: cosmopedia, simple_wikipedia,
#   stack_python, proofpile2, arxiv_gist (run step 1 for these).
#
# Component budgets (scaled from the 90B caps to ~28B):
#   general 11.0 | kleene 4.7 | gist 3.7 | sheaf 2.8 | padic 2.8 | rg 2.8
# =====================================================================

mixture:
  # -------------------- general foundation (11.0B) --------------------
  - name: fineweb_edu
    component: general
    hf_dataset: HuggingFaceFW/fineweb-edu
    hf_config: sample-10BT
    split: train
    tokens_b: 6.0
    weight: 0.216
    text_field: text
    source_formatter: null
    purpose: High-quality educational web foundation

  - name: cosmopedia
    component: general
    hf_dataset: HuggingFaceTB/cosmopedia
    hf_config: web_samples_v2
    split: train
    tokens_b: 2.5
    weight: 0.090
    text_field: text
    source_formatter: null
    download: cosmopedia
    purpose: Synthetic textbook-quality prose

  - name: simple_wikipedia
    component: general
    hf_dataset: wikipedia
    hf_config: 20220301.simple
    split: train
    tokens_b: 1.5
    weight: 0.054
    text_field: text
    source_formatter: null
    download: simple_wikipedia
