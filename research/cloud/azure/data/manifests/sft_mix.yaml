  - name: kyro_voice_patterns
    hf_dataset: null
    hf_config: null
    split: null
    local_path: data/sft/kyro_voice_patterns.jsonl
    examples_k: 20
    weight: 0.02
    format: messages
    priority: kyro
    sample_weight_multiplier: 5.0
    purpose: Natural voice interaction

# Aggregate: ~6.5M examples, 3 epochs, weights sum to ~1.00
total_examples_k: 6512
epochs: 3

# Curriculum order: reasoning -> instruction -> tool -> kyro
# Each priority block trained sequentially; within each block, shuffle.
curriculum_order:
  - reasoning
  - instruction
  - tool
  - kyro
