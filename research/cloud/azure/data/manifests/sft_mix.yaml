  - name: kyro_consequence
    hf_dataset: null
    hf_config: null
    split: null
    local_path: data/sft/kyro_consequence.jsonl
    examples_k: 5
    weight: 0.01
    format: instruction_response
    priority: kyro
    sample_weight_multiplier: 5.0
