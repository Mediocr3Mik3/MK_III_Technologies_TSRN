$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
display_name: tropformer-dpo
experiment_name: tropformer-dpo
description: DPO on 25K preference pairs, init from best SFT checkpoint

compute: azureml:h100-cluster
resources:
  instance_count: 1
distribution:
  type: pytorch
  process_count_per_instance: 8

environment: azureml:tropformer-cuda124@latest

code: ../../../..

inputs:
  raw_dpo:
    type: uri_folder
    mode: ro_mount
    path: azureml://datastores/blobdata/paths/raw/dpo
  tokenizer:
    type: uri_file
    mode: ro_mount
    path: azureml://datastores/blobdata/paths/tokenizers/tmt_32k.json
  sft_ckpt:
    type: uri_file
    mode: ro_mount
    path: azureml://datastores/blobdata/paths/checkpoints/sft/best.pt

outputs:
  ckpt_dir:
    type: uri_folder
    mode: rw_mount
    path: azureml://datastores/blobdata/paths/checkpoints/dpo

environment_variables:
  TROPFORMER_TMT_PATH: ${{inputs.tokenizer}}
  WANDB_API_KEY: $WANDB_API_KEY

command: >-
  python -m research.cloud.azure.train_dpo_cloud
  --config    dpo_h100x8
  --tag       azure_run
  --init-from ${{inputs.sft_ckpt}}
  --wandb-project tropformer-dpo
